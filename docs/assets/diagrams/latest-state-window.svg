<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" role="img" aria-labelledby="title desc">
  <title id="title">Latest value loses the temporal window</title>
  <desc id="desc">A shared position axis from pos 0 to pos 25 shows an unhealthy history window from pos 5 to pos 12, while the latest value lane only shows a healthy point and a dashed ghost of the missing prior window.</desc>
  <defs>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #2B2A26; font-size: 15px; font-weight: 780; }
      .interval { fill: #6B6659; font-size: 13px; font-weight: 720; }
      .tick { fill: #6B6659; font-size: 13px; font-weight: 760; }
      .guide { stroke: #9A9484; stroke-width: 1.2; stroke-dasharray: 3 5; }
      .axis { stroke: #9A9484; stroke-width: 1.2; }
    </style>
  </defs>
  <rect width="760" height="260" fill="#F5EFE0"/>
  <rect x="18" y="18" width="724" height="224" rx="8" fill="#F0E9D6" stroke="#D9CFB4"/>
  <g class="guide">
    <line x1="270" y1="42" x2="270" y2="204"/>
    <line x1="410" y1="42" x2="410" y2="204"/>
    <line x1="530" y1="42" x2="530" y2="204"/>
  </g>
  <g>
    <text class="label" x="116" y="73" text-anchor="end">Unhealthy</text>
    <text class="interval" x="116" y="93" text-anchor="end">[pos 5, pos 12)</text>
    <rect x="270" y="58" width="140" height="34" rx="4" fill="#B8742A" stroke="#D79A69"/>
    <text x="340" y="80" fill="#F5EFE0" font-size="14" font-weight="780" text-anchor="middle">state was active</text>
  </g>
  <g>
    <text class="label" x="116" y="142" text-anchor="end">Latest</text>
    <text class="interval" x="116" y="162" text-anchor="end">value at pos 18</text>
    <rect x="270" y="126" width="140" height="34" rx="4" fill="none" stroke="#B8742A" stroke-width="2" stroke-dasharray="7 6"/>
    <text x="340" y="148" fill="#8F6B4C" font-size="14" font-weight="780" text-anchor="middle">not in row</text>
    <circle cx="530" cy="143" r="9" fill="#3E6B5C" stroke="#F5EFE0" stroke-width="3"/>
    <text x="558" y="148" fill="#3E6B5C" font-size="14" font-weight="780">Healthy</text>
  </g>
  <g class="axis">
    <line x1="170" y1="204" x2="670" y2="204"/>
    <line x1="170" y1="204" x2="170" y2="212"/>
    <line x1="270" y1="204" x2="270" y2="212"/>
    <line x1="370" y1="204" x2="370" y2="212"/>
    <line x1="470" y1="204" x2="470" y2="212"/>
    <line x1="570" y1="204" x2="570" y2="212"/>
    <line x1="670" y1="204" x2="670" y2="212"/>
  </g>
  <g class="tick" text-anchor="middle">
    <text x="170" y="230">pos 0</text>
    <text x="270" y="230">pos 5</text>
    <text x="370" y="230">pos 10</text>
    <text x="470" y="230">pos 15</text>
    <text x="570" y="230">pos 20</text>
    <text x="670" y="230">pos 25</text>
  </g>
</svg>
