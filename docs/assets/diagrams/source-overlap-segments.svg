<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="title desc">
  <title id="title">Source windows split into aligned segments</title>
  <desc id="desc">Station is active from pos 3 to pos 16, Model is active from pos 10 to pos 22, and the segments row splits the result into station only, overlap, and model only intervals.</desc>
  <defs>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #2B2A26; font-size: 15px; font-weight: 780; }
      .interval { fill: #6B6659; font-size: 13px; font-weight: 720; }
      .segment-text { fill: #F5EFE0; font-size: 15px; font-weight: 820; }
      .tick { fill: #6B6659; font-size: 13px; font-weight: 760; }
      .guide { stroke: #9A9484; stroke-width: 1.2; stroke-dasharray: 3 5; }
      .axis { stroke: #9A9484; stroke-width: 1.2; }
    </style>
  </defs>
  <rect width="760" height="300" fill="#F5EFE0"/>
  <rect x="18" y="18" width="724" height="264" rx="8" fill="#F0E9D6" stroke="#D9CFB4"/>
  <g class="guide">
    <line x1="230" y1="40" x2="230" y2="240"/>
    <line x1="370" y1="40" x2="370" y2="240"/>
    <line x1="490" y1="40" x2="490" y2="240"/>
    <line x1="610" y1="40" x2="610" y2="240"/>
  </g>
  <g>
    <text class="label" x="116" y="72" text-anchor="end">Station</text>
    <text class="interval" x="116" y="92" text-anchor="end">[pos 3, pos 16)</text>
    <rect x="230" y="56" width="260" height="34" rx="4" fill="#5E7A9B" stroke="#8FA7C2"/>
  </g>
  <g>
    <text class="label" x="116" y="132" text-anchor="end">Model</text>
    <text class="interval" x="116" y="152" text-anchor="end">[pos 10, pos 22)</text>
    <rect x="370" y="116" width="240" height="34" rx="4" fill="#3E6B5C" stroke="#6FA18F"/>
  </g>
  <g>
    <text class="label" x="116" y="198" text-anchor="end">Segments</text>
    <rect x="230" y="178" width="140" height="36" rx="4" fill="#5E7A9B" stroke="#8FA7C2"/>
    <rect x="370" y="178" width="120" height="36" rx="4" fill="#B8742A" stroke="#D79A69"/>
    <rect x="490" y="178" width="120" height="36" rx="4" fill="#3E6B5C" stroke="#6FA18F"/>
    <text class="segment-text" x="300" y="201" text-anchor="middle">Station only</text>
    <text class="segment-text" x="430" y="201" text-anchor="middle">Overlap</text>
    <text class="segment-text" x="550" y="201" text-anchor="middle">Model only</text>
  </g>
  <g class="axis">
    <line x1="170" y1="240" x2="670" y2="240"/>
    <line x1="170" y1="240" x2="170" y2="248"/>
    <line x1="270" y1="240" x2="270" y2="248"/>
    <line x1="370" y1="240" x2="370" y2="248"/>
    <line x1="470" y1="240" x2="470" y2="248"/>
    <line x1="570" y1="240" x2="570" y2="248"/>
    <line x1="670" y1="240" x2="670" y2="248"/>
  </g>
  <g class="tick" text-anchor="middle">
    <text x="170" y="266">pos 0</text>
    <text x="270" y="266">pos 5</text>
    <text x="370" y="266">pos 10</text>
    <text x="470" y="266">pos 15</text>
    <text x="570" y="266">pos 20</text>
    <text x="670" y="266">pos 25</text>
  </g>
</svg>
