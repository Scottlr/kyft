<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" role="img" aria-labelledby="title desc">
  <title id="title">Live horizon splits an open window</title>
  <desc id="desc">An open window from pos 6 onward is cut at live horizon pos 18, producing a final span before the horizon and a provisional dashed span after it.</desc>
  <defs>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #2B2A26; font-size: 15px; font-weight: 780; }
      .interval { fill: #6B6659; font-size: 13px; font-weight: 720; }
      .bar-text { fill: #F5EFE0; font-size: 15px; font-weight: 820; }
      .provisional-text { fill: #6B6659; font-size: 15px; font-weight: 820; }
      .tick { fill: #6B6659; font-size: 13px; font-weight: 760; }
      .axis { stroke: #9A9484; stroke-width: 1.2; }
    </style>
  </defs>
  <rect width="760" height="250" fill="#F5EFE0"/>
  <rect x="18" y="18" width="724" height="214" rx="8" fill="#F0E9D6" stroke="#D9CFB4"/>
  <g>
    <text class="label" x="116" y="98" text-anchor="end">Window</text>
    <text class="interval" x="116" y="118" text-anchor="end">[pos 6, -&gt;)</text>
    <rect x="290" y="78" width="240" height="36" rx="4" fill="#B8742A" stroke="#D79A69"/>
    <rect x="530" y="78" width="140" height="36" rx="4" fill="none" stroke="#9A9484" stroke-width="2" stroke-dasharray="7 6"/>
    <text class="bar-text" x="410" y="101" text-anchor="middle">Final</text>
    <text class="provisional-text" x="600" y="101" text-anchor="middle">Provisional</text>
  </g>
  <g>
    <line x1="530" y1="42" x2="530" y2="178" stroke="#C97A3A" stroke-width="2"/>
    <rect x="450" y="34" width="160" height="28" rx="5" fill="#F4D09A" stroke="#C97A3A"/>
    <text x="530" y="53" fill="#6A4214" font-size="15" font-weight="820" text-anchor="middle">Live horizon · pos 18</text>
  </g>
  <g class="axis">
    <line x1="170" y1="178" x2="670" y2="178"/>
    <line x1="170" y1="178" x2="170" y2="186"/>
    <line x1="270" y1="178" x2="270" y2="186"/>
    <line x1="370" y1="178" x2="370" y2="186"/>
    <line x1="470" y1="178" x2="470" y2="186"/>
    <line x1="570" y1="178" x2="570" y2="186"/>
    <line x1="670" y1="178" x2="670" y2="186"/>
  </g>
  <g class="tick" text-anchor="middle">
    <text x="170" y="204">pos 0</text>
    <text x="270" y="204">pos 5</text>
    <text x="370" y="204">pos 10</text>
    <text x="470" y="204">pos 15</text>
    <text x="570" y="204">pos 20</text>
    <text x="670" y="204">pos 25</text>
  </g>
</svg>
